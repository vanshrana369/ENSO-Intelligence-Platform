name: Run Tests on Push

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas python-dotenv

      - name: Test NOAA fetcher imports
        run: python -c "import data_pipeline.fetch_noaa; print('OK')"